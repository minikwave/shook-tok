services:
  postgres:
    image: postgres:16-alpine
    container_name: shook-tok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shook
      POSTGRES_PASSWORD: shook_dev
      POSTGRES_DB: shook_tok
    ports:
      - "5432:5432"
    volumes:
      - shook_tok_pgdata:/var/lib/postgresql/data

volumes:
  shook_tok_pgdata:
